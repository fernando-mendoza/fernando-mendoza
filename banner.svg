<svg width="940" height="330" viewBox="0 0 940 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fernando Mendoza — Site Reliability Engineer and indie builder">
  <!-- terminal panel -->
  <rect x="1.5" y="1.5" width="937" height="327" rx="18" fill="#39424F" stroke="#B87B56" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- title bar -->
  <circle cx="34" cy="32" r="7" fill="#B87B56"/>
  <circle cx="58" cy="32" r="7" fill="#D9A98C"/>
  <circle cx="82" cy="32" r="7" fill="#F4EBE6"/>
  <text x="470" y="37" text-anchor="middle" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="13" fill="#F4EBE6" fill-opacity="0.55">fernando@mx: ~</text>
  <line x1="1.5" y1="58" x2="938.5" y2="58" stroke="#B87B56" stroke-opacity="0.35" stroke-width="1"/>

  <!-- body -->
  <g font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace">
    <text x="40" y="102" font-size="17">
      <tspan fill="#B87B56">$</tspan>
      <tspan fill="#F4EBE6" dx="6">whoami</tspan>
    </text>
    <text x="40" y="148" font-size="36" font-weight="bold" fill="#F4EBE6">Fernando Mendoza</text>
    <text x="40" y="180" font-size="17" fill="#C7CDD6">Site Reliability Engineer · indie builder</text>

    <text x="40" y="226" font-size="17">
      <tspan fill="#B87B56">$</tspan>
      <tspan fill="#F4EBE6" dx="6">uptime</tspan>
    </text>
    <text x="40" y="256" font-size="17" fill="#C7CDD6">6+ years keeping production alive — DevOps · Cloud · Security</text>

    <text x="40" y="298" font-size="17">
      <tspan fill="#B87B56">$</tspan>
    </text>
    <rect x="62" y="284" width="10" height="18" fill="#B87B56">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
